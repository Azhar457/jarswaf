certificates = []
allowlists = []
blacklists = []

[global]
port_http = 8080
port_https = 8443
max_body_size = 10485760
default_rate_limit = 600
log_dir = "./logs"
log_level = "verbose"
admin_token = "6476d3eb0e7043f7b72272c308fce8bc"
waf_enabled = true
webhooks = []
metrics_push_interval_secs = 60

[tls]
mode = "local_ca"
cert_dir = "./certs"

[logging]
mode = "sqlite"
log_path = "./logs/jarswaf.log"
max_log_size_mb = 50
max_log_files = 5
push_interval_secs = 300
push_batch_size = 100
blocklist_path = "./blocklist.json"
db_path = "/var/log/jarswaf/jarswaf.db"

[components]
dashboard = true
clickhouse = true
service_discovery = true
geoip = true

[[rate_limit_policies]]
name = "Default API/Website Traffic"
limit = "600 requests / minute"
burst = 100
path = "/*"
description = "Default threshold protecting backend sites from general automated scans."

[[rate_limit_policies]]
name = "Authentication Endpoints"
limit = "10 requests / minute"
burst = 5
path = "/login, /api/auth/*"
description = "Aggressive brute-force protection preventing credentials guessing."

[[rate_limit_policies]]
name = "WebDAV / Cloud File Storage"
limit = "2000 requests / minute"
burst = 200
path = "/remote.php/dav/*, /api/upload/*"
description = "Permissive tier optimized for photo synching and Nextcloud/Immich desktop clients."

[[rate_limit_policies]]
name = "Static Assets & Media"
limit = "Unlimited"
burst = 0
path = "/static/*, *.css, *.js, *.png"
description = "Exempted assets to reduce WAF engine evaluation overhead."

[[vhosts]]
name = "jarswaf-demo"
hosts = ["*.jarswafwaf.demo"]
backend = "127.0.0.1:8080"
tenant = "default"
rate_limit_tiers = []
rules = ["SQLI-*", "XSS-*", "LFI-*", "RFI-*", "SSRF-*", "CMDI-*", "BOT-*"]
blocked_countries = []
geoblock_type = "Blocklist"
custom_rules = ["CR-825"]
ssl = "Auto (Local CA)"
max_body = "10MB"
rate_limit = "600 req/min"
is_default = false
allowlists = []
blacklists = []
max_conns_per_ip = 50
max_concurrent_requests = 100
bot_challenge_enabled = false
websocket_security_enabled = false

[vhosts.logging]
enabled = true
db_path = "logs/jarswaf.db"

[[custom_rules]]
id = "CR-825"
name = "Block Admin"
condition_type = "path"
operator = "contains"
condition_value = "/wp-admin"
action = "redirect"
action_value = "https://www.youtube.com/watch?v=xvFZjo5PgG0"
enabled = true

[redis]
enabled = false
url = "redis://127.0.0.1:6379"
