apiVersion: v1
kind: Service
metadata:
  name: {{ include "jarswaf.fullname" . }}-proxy
  labels:
    {{- include "jarswaf.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.proxy.ports.http }}
      targetPort: http
      protocol: TCP
    - name: https
      port: {{ .Values.proxy.ports.https }}
      targetPort: https
      protocol: TCP
    - name: gossip
      port: {{ .Values.gossip.port }}
      targetPort: gossip
      protocol: UDP
  selector:
    {{- include "jarswaf.proxySelectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jarswaf.fullname" . }}-controller
  labels:
    {{- include "jarswaf.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.controller.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "jarswaf.controllerSelectorLabels" . | nindent 4 }}
