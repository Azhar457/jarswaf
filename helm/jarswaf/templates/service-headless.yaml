apiVersion: v1
kind: Service
metadata:
  name: {{ include "jarswaf.fullname" . }}-gossip
  labels:
    {{- include "jarswaf.labels" . | nindent 4 }}
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  ports:
    - name: gossip
      port: {{ .Values.gossip.port }}
      targetPort: gossip
      protocol: UDP
  selector:
    {{- include "jarswaf.proxySelectorLabels" . | nindent 4 }}
