{{- if .Values.proxy.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "jarswaf.fullname" . }}-proxy
  labels:
    {{- include "jarswaf.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "jarswaf.fullname" . }}-proxy
  minReplicas: {{ .Values.proxy.hpa.minReplicas }}
  maxReplicas: {{ .Values.proxy.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.proxy.hpa.targetCPU }}
{{- end }}
