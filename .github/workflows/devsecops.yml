name: DevSecOps CI (SAST & DAST)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'dashboard/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'xtask/**'
      - '.github/workflows/devsecops.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'dashboard/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'xtask/**'
      - '.github/workflows/devsecops.yml'

jobs:
  # -------------------------------------------------------------
  # Job 1: SAST - Static Code Analysis & Dependency Audits
  # -------------------------------------------------------------
  sast_audit:
    name: SAST & Auditing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Rust Environment
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      # Check Rust Code Formatting
      - name: Run Cargo Fmt
        run: cargo fmt --all -- --check

      # Static Analysis for Rust
      - name: Run Clippy (Rust SAST)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Security Audit for Rust crates
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run Cargo Audit (Rust Vulnerability Scan)
        run: cargo audit

      # Setup Node.js Environment (Dashboard)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      # Install Frontend Dependencies
      - name: Install Dashboard Dependencies
        run: npm ci --prefix dashboard

      # Svelte TypeScript Type-Checking
      - name: Run Svelte Check
        run: npm run check --prefix dashboard

      # Audit NPM Dependencies for Vulnerabilities
      - name: Run NPM Audit (Frontend Vulnerability Scan)
        run: npm audit --prefix dashboard

  # -------------------------------------------------------------
  # Job 2: CodeQL - GitHub Advanced Security Scan
  # -------------------------------------------------------------
  codeql_analysis:
    name: GitHub CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, rust

      # Autobuild Rust and Frontend
      - name: Autobuild CodeQL
        uses: github/codeql-action/autobuild@v3

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # -------------------------------------------------------------
  # Job 3: DAST - Dynamic Application Security Testing (OWASP ZAP)
  # -------------------------------------------------------------
  dast_zap_scan:
    name: DAST (OWASP ZAP Scan)
    runs-on: ubuntu-latest
    needs: [sast_audit]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Spin up jarsWAF and Dashboard via Docker Compose for testing
      - name: Spin up Docker Services
        run: |
          docker-compose up -d --build
          # Wait for services to be fully healthy and listening on port 8080
          sleep 15

      # Run OWASP ZAP Baseline scan against jarsWAF Controller/Dashboard
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: 'http://localhost:8080/'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false # Report findings without breaking builds immediately

