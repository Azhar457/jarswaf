name: Release Precompiled Binary

on:
  release:
    types: [created]
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Rust (Nightly for eBPF)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install dependencies & bpf-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev build-essential
          cargo install bpf-linker

      - name: Build eBPF Program
        run: cargo +nightly run --package xtask

      - name: Build Release Binaries
        run: cargo build --release --workspace

      - name: Prepare Assets
        run: |
          mv target/release/jarswaf jarswaf-linux-amd64
          mv target/release/agent jarswaf-agent-linux-amd64
          mv target/release/controller jarswaf-controller-linux-amd64
          cp jarswaf-ebpf/target/bpfel-unknown-none/release/jarswaf-ebpf jarswaf-ebpf

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jarswaf-linux-amd64
            jarswaf-agent-linux-amd64
            jarswaf-controller-linux-amd64
            jarswaf-ebpf
          tag_name: latest
          name: Latest Release
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
