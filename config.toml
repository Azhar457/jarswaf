certificates = []

[global]
port_http = 80
port_https = 443
max_body_size = 10485760
default_rate_limit = 600
log_dir = "./logs"
log_level = "verbose"
admin_token = "6476d3eb0e7043f7b72272c308fce8bc"
waf_enabled = true

[tls]
mode = "local_ca"
cert_dir = "./certs"

[[rate_limit_policies]]
name = "Default API/Website Traffic"
limit = "600 requests / minute"
burst = 100
path = "/*"
description = "Default threshold protecting backend sites from general automated scans."

[[rate_limit_policies]]
name = "Authentication Endpoints"
limit = "10 requests / minute"
burst = 5
path = "/login, /api/auth/*"
description = "Aggressive brute-force protection preventing credentials guessing."

[[rate_limit_policies]]
name = "WebDAV / Cloud File Storage"
limit = "2000 requests / minute"
burst = 200
path = "/remote.php/dav/*, /api/upload/*"
description = "Permissive tier optimized for photo synching and Nextcloud/Immich desktop clients."

[[rate_limit_policies]]
name = "Static Assets & Media"
limit = "Unlimited"
burst = 0
path = "/static/*, *.css, *.js, *.png"
description = "Exempted assets to reduce WAF engine evaluation overhead."

[[vhosts]]
name = "jarswaf-demo"
hosts = ["*.jarswafwaf.demo"]
backend = "127.0.0.1:8080"
rate_limit_tiers = []
rules = ["SQLI-*", "XSS-*", "LFI-*", "RFI-*", "SSRF-*", "CMDI-*", "BOT-*"]
blocked_countries = []
geoblock_type = "Blocklist"
custom_rules = ["CR-825"]
ssl = "Auto (Local CA)"
max_body = "10MB"
rate_limit = "600 req/min"

[vhosts.logging]
enabled = true
db_path = "logs/jarswaf.db"

[[custom_rules]]
id = "CR-825"
name = "Block Admin"
condition_type = "path"
operator = "contains"
condition_value = "/wp-admin"
action = "redirect"
action_value = "https://www.youtube.com/watch?v=xvFZjo5PgG0"
enabled = true
